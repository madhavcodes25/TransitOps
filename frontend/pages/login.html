<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TransitOps</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-body d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">

                <!-- Logo & Branding -->
                <div class="text-center mb-4">
                    <h2 class="text-primary fw-bold mb-1">TransitOps</h2>
                    <p class="text-muted small">Smart Transport Operations Platform</p>
                </div>

                <div class="card shadow-lg border-0 bg-body-tertiary">
                    <div class="card-body p-4 p-sm-5">

                        <h5 class="text-center mb-2 fw-semibold">Sign in to your account</h5>
                        <p class="text-center text-muted small mb-4">Enter your credentials to continue</p>

                        <!-- Hidden Error Alert -->
                        <div class="alert alert-danger d-none py-2 mb-4 border-danger" id="login-error" role="alert">
                            <div class="small fw-bold">❌ Invalid credentials.</div>
                            <div class="small mt-1 text-danger">Account locked after 5 failed attempts.</div>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label small text-muted text-uppercase">Email</label>
                                <input type="email" class="form-control bg-body border-secondary" id="email" required
                                    placeholder="raven.k@transitops.in">
                            </div>

                            <div class="mb-3">
                                <label for="password"
                                    class="form-label small text-muted text-uppercase">Password</label>
                                <input type="password" class="form-control bg-body border-secondary" id="password"
                                    required placeholder="••••••••">
                            </div>

                            <div class="mb-3">
                                <label for="roleSim" class="form-label small text-muted text-uppercase">Role
                                    (RBAC)</label>
                                <select class="form-select bg-body border-secondary" id="roleSim">
                                    <option value="Fleet Manager">Fleet Manager</option>
                                    <option value="Dispatcher" selected>Dispatcher</option>
                                    <option value="Safety Officer">Safety Officer</option>
                                    <option value="Financial Analyst">Financial Analyst</option>
                                </select>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input border-secondary" id="rememberMe">
                                    <label class="form-check-label small text-muted" for="rememberMe">Remember
                                        me</label>
                                </div>
                                <a href="#" class="small text-info text-decoration-none">Forgot password?</a>
                            </div>

                            <button type="submit" class="btn btn-warning w-100 text-dark fw-bold py-2">Sign In</button>
                        </form>

                    </div>
                </div>

                <div class="text-center mt-4">
                    <small class="text-muted text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">TRANSITOPS
                        © 2026 • RBAC ENABLED</small>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Auth Logic -->
    <script src="../js/auth.js"></script>
</body>

</html>
