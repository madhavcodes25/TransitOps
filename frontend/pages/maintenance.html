<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - TransitOps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

    <div class="d-flex" style="min-height: 100vh;">

        <!-- ================= SIDEBAR ================= -->
        <div class="bg-body-tertiary border-end d-flex flex-column" style="width: 250px;">
            <div class="p-4 border-bottom">
                <h4 class="text-primary mb-0 fw-bold">TransitOps</h4>
            </div>
            <ul class="nav flex-column mt-3 px-2 flex-grow-1">
                <li class="nav-item mb-1"><a href="dashboard.html" class="nav-link text-body-secondary">Dashboard</a></li>
                <li class="nav-item mb-1"><a href="vehicles.html" class="nav-link text-body-secondary">Fleet</a></li>
                <li class="nav-item mb-1"><a href="drivers.html" class="nav-link text-body-secondary">Drivers</a></li>
                <li class="nav-item mb-1"><a href="trips.html" class="nav-link text-body-secondary">Trips</a></li>
                <li class="nav-item mb-1"><a href="maintenance.html" class="nav-link active text-white bg-primary rounded">Maintenance</a></li>
                <li class="nav-item mb-1"><a href="fuel.html" class="nav-link text-body-secondary">Fuel & Expenses</a></li>
                <li class="nav-item mb-1"><a href="reports.html" class="nav-link text-body-secondary">Analytics</a></li>
                <li class="nav-item mb-1 mt-auto"><a href="settings.html" class="nav-link text-body-secondary">Settings</a></li>
            </ul>
        </div>

        <!-- ================= MAIN CONTENT ================= -->
        <div class="flex-grow-1 d-flex flex-column bg-body">

            <!-- TOP NAVIGATION -->
            <nav class="navbar border-bottom px-3 py-3 bg-body-tertiary">
                <div class="ms-auto d-flex align-items-center">
                    <span class="me-3 fw-semibold d-none d-sm-block" id="nav-username"></span>
                    <span class="badge bg-secondary rounded-pill px-3 py-2 me-3" id="nav-role"></span>
                    <button class="btn btn-sm btn-outline-danger fw-bold" onclick="logout()">Logout</button>
                </div>
            </nav>

            <div class="p-4 overflow-auto">
                <div class="row g-4">
                    <!-- LEFT COLUMN: Log Service Record Form -->
                    <div class="col-lg-4">
                        <h6 class="text-uppercase text-muted mb-3">Log Service Record</h6>
                        <div class="card border-0 shadow-sm bg-body-tertiary p-3">
                            <form id="maintenanceForm">
                                <div class="mb-3">
                                    <label class="form-label small text-muted">Vehicle *</label>
                                    <select class="form-select bg-body border-secondary" id="maint-vehicle" required>
                                        <option value="">Select a vehicle...</option>
                                        <option value="VAN-05">VAN-05</option>
                                        <option value="TRUCK-11">TRUCK-11</option>
                                        <option value="MINI-03">MINI-03</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small text-muted">Service Type *</label>
                                    <input type="text" class="form-control bg-body border-secondary" id="maint-type" required placeholder="e.g. Oil Change">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small text-muted">Cost (Rs) *</label>
                                    <input type="number" class="form-control bg-body border-secondary" id="maint-cost" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small text-muted">Date</label>
                                    <input type="date" class="form-control bg-body border-secondary" id="maint-date" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label small text-muted">Status</label>
                                    <select class="form-select bg-body border-secondary" id="maint-status">
                                        <option value="Active">Active (Vehicle In Shop)</option>
                                        <option value="Completed">Completed (Vehicle Available)</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-warning w-100 text-dark fw-bold">Save Record</button>
                            </form>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: Service Log Table -->
                    <div class="col-lg-8">
                        <h6 class="text-uppercase text-muted mb-3">Service Log</h6>
                        <div class="card border-0 shadow-sm">
                            <div class="table-responsive">
                                <table class="table table-hover table-borderless mb-0 align-middle">
                                    <thead class="table-dark text-uppercase small text-muted">
                                        <tr><th>Vehicle</th><th>Service</th><th>Date</th><th>Cost</th><th>Status</th><th>Action</th></tr>
                                    </thead>
                                    <tbody id="maintenance-table-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
        <div id="liveToast" class="toast align-items-center border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium text-white" id="toastMessage"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/maintenance.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            checkAuth();
            document.getElementById('maint-date').valueAsDate = new Date();
        });
    </script>
</body>
</html>
