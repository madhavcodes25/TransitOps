    <title>TransitOps - Loading...</title>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("transitops_token");

                window.location.href = "pages/login.html";

                window.location.href = "pages/dashboard.html";
            }
        });
    </script>
